apiVersion: v1
kind: Namespace
metadata:
  name: troubleshooting-vmware
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: tkgs-fio-pvc
  namespace: troubleshooting-vmware
spec:
  accessModes: ["ReadWriteOnce"]
  storageClassName: "REPLACE_VSPHERE_STORAGECLASS"
  resources:
    requests:
      storage: 20Gi
---
apiVersion: batch/v1
kind: Job
metadata:
  name: tkgs-fio-benchmark
  namespace: troubleshooting-vmware
spec:
  ttlSecondsAfterFinished: 600
  template:
    spec:
      restartPolicy: Never
      containers:
        - name: fio
          image: ljishen/fio:latest
          command: ["/bin/sh", "-c"]
          args:
            - |
              fio --name=randrw --rw=randrw --bs=4k --size=2G --filename=/data/testfile --direct=1 --iodepth=64 --numjobs=4 --runtime=120 --time_based --group_reporting
          volumeMounts:
            - name: data
              mountPath: /data
          resources:
            requests:
              cpu: "500m"
              memory: "512Mi"
            limits:
              cpu: "2000m"
              memory: "1Gi"
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: tkgs-fio-pvc
