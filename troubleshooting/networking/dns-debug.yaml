###############################################################################
# Troubleshooting: DNS Resolution Debugging
###############################################################################
---
apiVersion: v1
kind: Pod
metadata:
  name: dnsutils
  namespace: troubleshooting
  labels:
    app: dnsutils
    scenario: dns-debug
spec:
  restartPolicy: Never
  containers:
    - name: dnsutils
      image: registry.k8s.io/e2e-test-images/jessie-dnsutils:1.3
      command:
        - /bin/sh
        - -c
        - |
          echo "=== CoreDNS Pod status ==="
          nslookup kubernetes.default.svc.cluster.local

          echo "=== External DNS resolution ==="
          dig +short google.com
          dig +short github.com

          echo "=== Reverse DNS ==="
          dig -x $(getent hosts kubernetes.default | awk '{print $1}')

          echo "=== DNS timing test ==="
          for i in $(seq 1 10); do
            time nslookup google.com > /dev/null 2>&1
          done

          echo "=== /etc/resolv.conf ==="
          cat /etc/resolv.conf

          sleep 3600
      resources:
        requests:
          cpu: "50m"
          memory: "64Mi"
        limits:
          cpu: "200m"
          memory: "128Mi"

---
# ── CoreDNS ConfigMap patch for debug logging ─────────────────────────────────
apiVersion: v1
kind: ConfigMap
metadata:
  name: coredns-debug-patch
  namespace: kube-system
  annotations:
    note: "Merge this into the existing coredns ConfigMap — adds log plugin"
data:
  Corefile: |
    .:53 {
        log
        errors
        health {
          lameduck 5s
        }
        ready
        kubernetes cluster.local in-addr.arpa ip6.arpa {
          pods insecure
          fallthrough in-addr.arpa ip6.arpa
          ttl 30
        }
        prometheus :9153
        forward . /etc/resolv.conf {
          max_concurrent 1000
        }
        cache 30
        loop
        reload
        loadbalance
    }
